name: fintrack
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0  # Fixed: Changed from 6.0.0 to 3.0.0

flutter:
  uses-material-design: true
  # Added the assets section so the app can actually find your logo
  assets:
    - assets/images/

# Fixed: This section MUST be at the top level (no spaces before it)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/finlogo1.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/finlogo1.png"